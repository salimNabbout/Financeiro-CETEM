<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <title>Gerência Financeira</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <link rel="stylesheet" href="css/styles.css?v=202605061657" />
</head>
<body class="bg-slate-50 text-slate-800">
  <div class="flex min-h-screen">
    <button id="btn-menu" class="md:hidden fixed top-3 left-3 z-40 bg-slate-900 text-white rounded p-2" aria-label="Abrir menu">☰</button>
    <aside id="sidebar" class="w-56 bg-slate-900 text-slate-100 flex flex-col fixed md:static inset-y-0 left-0 z-30 transform -translate-x-full md:translate-x-0 transition-transform">
      <div class="p-4 border-b border-slate-700 space-y-2">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2">
            <div class="text-sm font-semibold leading-tight">GERÊNCIA<br>FINANCEIRA</div>
          </div>
          <button id="btn-close-menu" class="md:hidden text-slate-300 text-xl" aria-label="Fechar">×</button>
        </div>
        <select id="sel-empresa" class="w-full bg-slate-800 text-slate-100 text-xs rounded px-2 py-1 border border-slate-700"></select>
        <select id="sel-perfil" class="w-full bg-slate-800 text-slate-100 text-xs rounded px-2 py-1 border border-slate-700"></select>
      </div>
      <nav id="nav" class="flex-1 p-2 space-y-1 text-sm overflow-y-auto"></nav>
      <div class="p-3 text-xs text-slate-400 border-t border-slate-700 space-y-2">
        <div id="user-block" class="pb-2 border-b border-slate-700 hidden">
          <div class="text-[10px] uppercase tracking-wider text-slate-500">Logado como</div>
          <div id="user-email" class="text-slate-100 font-medium truncate" title="">—</div>
          <button id="btn-logout" class="mt-1 w-full text-left text-xs text-slate-300 hover:text-white underline">↩ Sair</button>
        </div>
        <div id="empresa-nome">—</div>
        <div class="flex items-center justify-between">
          <span>v0.5 · Uso interno</span>
          <span id="online-badge" class="badge badge-g">offline?</span>
        </div>
      </div>
    </aside>
    <main class="flex-1 p-4 md:p-6 overflow-x-hidden w-full">
      <div class="print-only mb-4 pb-2 border-b-2 border-black">
        <div class="text-xs uppercase tracking-wider">Cockpit Financeiro</div>
        <div id="print-empresa" class="text-lg font-semibold"></div>
        <div id="print-data" class="text-xs"></div>
      </div>
      <header class="flex items-center justify-between mb-6 gap-2 flex-wrap">
        <div class="ml-10 md:ml-0">
          <h1 id="page-title" class="text-2xl font-bold">Dashboard</h1>
          <p id="page-sub" class="text-sm text-slate-500">Visão executiva do caixa, margem e alertas.</p>
        </div>
        <div class="flex gap-2 flex-wrap no-print">
          <button id="btn-search" class="px-3 py-2 bg-white border border-slate-300 rounded text-sm hover:bg-slate-100" title="Ctrl+K">🔍 Buscar</button>
          <button id="btn-theme" class="px-3 py-2 bg-white border border-slate-300 rounded text-sm hover:bg-slate-100" title="Alternar entre claro e escuro"><span id="theme-label">🌙 Escuro</span></button>
          <button id="btn-print" class="px-3 py-2 bg-white border border-slate-300 rounded text-sm hover:bg-slate-100">Imprimir</button>
          <button id="btn-snapshot" class="px-3 py-2 bg-white border border-slate-300 rounded text-sm hover:bg-slate-100">Snapshot</button>
          <button id="btn-export" class="px-3 py-2 bg-white border border-slate-300 rounded text-sm hover:bg-slate-100">Exportar</button>
          <label class="px-3 py-2 bg-white border border-slate-300 rounded text-sm cursor-pointer hover:bg-slate-100">
            Importar
            <input id="file-import" type="file" accept="application/json" class="hidden"/>
          </label>
          <button id="btn-reset" class="px-3 py-2 bg-white border border-slate-300 rounded text-sm hover:bg-slate-100">Zerar</button>
        </div>
      </header>
      <section id="view" class="space-y-6"></section>
    </main>
    <div id="sidebar-overlay" class="md:hidden fixed inset-0 bg-black/40 z-20 hidden"></div>
  </div>

  <div id="modal-root"></div>

  <!-- Backend de dados: Supabase (provisorio). Para reverter ao localStorage,
       troque o bloco abaixo por: <script src="js/db.js"></script> -->
  <script src="js/supabase_config.js?v=202605061657"></script>
  <script src="js/supabase_client.js?v=202605061657"></script>
  <script src="js/auth.js?v=202605061657"></script>
  <script src="js/db_supabase.js?v=202605061657"></script>
  <script src="js/kpis.js?v=202605061657"></script>
  <script src="js/ui.js?v=202605061657"></script>
  <script src="js/reports.js?v=202605061657"></script>
  <script src="js/validators.js?v=202605061657"></script>
  <script src="js/ofx.js?v=202605061657"></script>
  <script src="js/impostos.js?v=202605061657"></script>
  <script src="js/pix.js?v=202605061657"></script>
  <script src="js/views.js?v=202605061657"></script>
  <!-- Bootstrap: 1) checa sessao; 2) se nao logado, mostra login; 3) aguarda DB.ready; 4) carrega app.js -->
  <script>
    (async () => {
      const view = document.getElementById('view');
      view.innerHTML = '<div class="card"><strong>Verificando sessao...</strong></div>';

      // 1) Sessao
      const session = await Auth.getSession();
      if (!session) {
        Auth.renderLoginScreen({ onSuccess: () => location.reload() });
        return;
      }

      // 2) Mostra email logado e botao Sair na sidebar (bloco proprio,
      //    nao usa #empresa-nome porque app.js sobrescreve aquele elemento).
      const userBlock = document.getElementById('user-block');
      const userEmailEl = document.getElementById('user-email');
      const btnLogout = document.getElementById('btn-logout');
      const userEmail = (session.user.email || '').toLowerCase();
      if (userBlock && userEmailEl && btnLogout) {
        userEmailEl.textContent = userEmail || 'usuario';
        userEmailEl.title = userEmail;
        userBlock.classList.remove('hidden');
        btnLogout.onclick = async () => {
          if (!confirm('Sair da sua conta?')) return;
          await Auth.signOut();
          location.reload();
        };
      }

      // 2b) Permissoes por email: admin ve botoes destrutivos, outros nao.
      const adminEmails = (window.ADMIN_EMAILS || []).map(e => e.toLowerCase());
      window.IS_ADMIN = adminEmails.includes(userEmail);
      if (!window.IS_ADMIN) {
        // Esconde botoes destrutivos para nao-admin (manter a barra mais limpa)
        ['btn-reset','btn-snapshot','btn-export'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.classList.add('hidden');
        });
        // O input file-import esta dentro de um <label>; esconde o label inteiro
        const fileImport = document.getElementById('file-import');
        if (fileImport && fileImport.parentElement) fileImport.parentElement.classList.add('hidden');
      }

      // 3) Aguarda DB.ready (Supabase carregar sessao e dados iniciais)
      try {
        if (window.DB && window.DB.ready) await window.DB.ready;
      } catch (e) {
        view.innerHTML = '<div class="card"><strong style="color:#b91c1c">Erro ao conectar ao banco:</strong> ' + (e.message || e) + '</div>';
        return;
      }

      // 4) Carrega app.js dinamicamente - so agora que DB esta pronto
      const s = document.createElement('script');
      s.src = 'js/app.js?v=202605061657';
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
